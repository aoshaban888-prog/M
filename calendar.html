<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقويم — نظام التنبيهات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body id="page-calendar"><script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>
<div class="app-shell">

  <!-- ══ Sidebar ══ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <p class="eyebrow">نظام التنبيهات</p>
      <h1>لوحة تحكم ذكية</h1>
      <p class="muted" style="margin-top:4px;">إدارة سجلات مسارات</p>
    </div>
    <nav class="nav-card">
      <a class="nav-link" href="index.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        نظرة عامة
      </a>
      <a class="nav-link" href="alerts.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        التنبيهات
        <span class="nav-badge js-urgent-badge" style="display:none">0</span>
      </a>
      <a class="nav-link active" href="calendar.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        التقويم
      </a>
      <a class="nav-link" href="manage.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        لوحة الإدارة
      </a>
      <a class="nav-link" href="settings.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        الإعدادات
      </a>
    </nav>
    <div class="mini-card">
      <h3>ملخص سريع</h3>
      <ul id="sidebarSummary"><li>جارٍ التحميل...</li></ul>
    </div>
  </aside>

  <!-- ══ Content ══ -->
  <main class="content">
    <header class="topbar">
      <div>
        <p class="eyebrow">التقويم الزمني</p>
        <h2>مواعيد التجديد والانتهاء</h2>
      </div>
      <div class="top-actions">
        <button class="ghost-btn small-btn" onclick="location.href='manage.html'">إضافة عنصر</button>
      </div>
    </header>

    <div class="two-col">
      <!-- Calendar Panel -->
      <article class="panel">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="calPrev">&#8250; السابق</button>
          <h3 id="calMonthLabel"></h3>
          <button class="cal-nav-btn" id="calNext">التالي &#8249;</button>
        </div>
        <div class="cal-header-days">
          <span>أحد</span><span>اثن</span><span>ثلث</span><span>أرب</span><span>خمس</span><span>جمع</span><span>سبت</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div style="display:flex; gap:12px; margin-top:12px; font-size:0.82rem; color:var(--muted);">
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-left:4px;vertical-align:middle"></span>حرج (≤7 أيام)</span>
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warning);margin-left:4px;vertical-align:middle"></span>تحذير (≤30 يوم)</span>
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);margin-left:4px;vertical-align:middle"></span>عادي</span>
        </div>
        <div class="cal-selected-items" id="calSelectedItems" style="display:none">
          <div class="section-title" style="margin-top:14px">
            <h3 id="calSelectedDate"></h3>
          </div>
          <div class="alert-list" id="calDayAlerts"></div>
        </div>
      </article>

      <!-- Timeline Panel -->
      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">الجدول الزمني</p>
            <h3>مجمّع حسب الأولوية</h3>
          </div>
        </div>

        <div id="timelineGroups" style="display:grid; gap:20px;"></div>
      </article>
    </div>
  </main>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="script.js"></script>
</body>
</html>
